<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background: linear-gradient(125deg, skyblue, lightpink, beige);
            justify-content: center;
            align-items: center;
            display: flex;
            height: 100vh;
        }
        #container {
            background-color: white;
            width: 320px;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            align-content: center;
        }
        #textInput {
            height: 120px;
            width: 100%;
            border: 2px solid black;
            padding: 8px;
        }
        #box {
            display: flex;
            justify-content: space-between;
        }
        button {
            height: 40px;
            width: 100px;
            border-radius: 10px;
            border: 0px;
            align-items: center;
            cursor: pointer;
            position: fixed;
            bottom: 120px;
            left: 45%;
        }
    </style>
</head>
<body>
    <div id="parent">
      <div id="container">
        <h2>Live Character Counter</h2>
        <textarea id="textInput" placeholder="Enter Text"></textarea>
        <div id="box">
            <p>Total Characters : 
                <span id="charCount">0</span>
            </p>
            <p>Remaining Characters : 
                <span id="Remaining">100</span>
            </p>
        </div>
      </div>
        <button id="Submit">Submit</button>
    </div>
    <script>
        const Input = document.getElementById("textInput");
        const Count = document.getElementById("charCount");
        const Remaining = document.getElementById("Remaining");

        Input.addEventListener("input", function() {
            let typedLength = Input.value.length;
            Count.textContent = typedLength;
            Remaining.textContent = 100 - typedLength;
        })

        let ctn = document.getElementById("container")
        let btn = document.getElementById("Submit")
        flag = 0

        btn.addEventListener("click", function() {
            if(ctn.style.display == "none") {
                ctn.style.display = "block";
                flag = 1;
            }
            else {
                ctn.style.display = "none"
                flag = 0;
            }
        })
    </script>
</body>
</html>
